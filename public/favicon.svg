<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="url(#bgGrad)" rx="60"/>
  
  <!-- Code brackets - left -->
  <path d="M 70 80 L 50 128 L 70 176" stroke="url(#accentGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Code brackets - right -->
  <path d="M 186 80 L 206 128 L 186 176" stroke="url(#accentGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center dot (symbolic point) -->
  <circle cx="128" cy="128" r="12" fill="url(#accentGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="4" fill="#60a5fa" opacity="0.6"/>
  <circle cx="156" cy="156" r="4" fill="#60a5fa" opacity="0.6"/>
  <circle cx="156" cy="100" r="3" fill="#93c5fd" opacity="0.4"/>
  <circle cx="100" cy="156" r="3" fill="#93c5fd" opacity="0.4"/>
</svg>